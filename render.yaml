services:
  - type: web
    name: factchecker-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: "https://api.groq.com/openai/v1"
      - key: LLM_MODEL_NAME
        value: "llama-3.3-70b-versatile"
      - key: PYTHON_VERSION
        value: "3.9.0"
